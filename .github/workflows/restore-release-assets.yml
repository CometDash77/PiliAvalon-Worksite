name: Restore Release Assets

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "GitHub Actions run ID that already contains the APK artifacts"
        required: true
        type: string
      release_tag:
        description: "Release tag to receive the restored APK assets"
        required: true
        type: string

permissions:
  actions: read
  contents: write

jobs:
  restore:
    name: Restore APK artifacts to prerelease
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Download original APK artifacts by ID
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p restored

          download_artifact_apk() {
            local artifact_id="$1"
            local apk_name="$2"
            curl --fail --location --show-error \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" \
              --output "${apk_name}"
          }

          download_artifact_apk 7620714124 'PiliAvalon_android_2.0.8-f96a0e1d7+5162_arm64-v8a.apk'
          download_artifact_apk 7620714273 'PiliAvalon_android_2.0.8-f96a0e1d7+5162_armeabi-v7a.apk'
          download_artifact_apk 7620714427 'PiliAvalon_android_2.0.8-f96a0e1d7+5162_x86_64.apk'

          ls -lh PiliAvalon_android_2.0.8-f96a0e1d7+5162_*.apk
          test -f 'PiliAvalon_android_2.0.8-f96a0e1d7+5162_arm64-v8a.apk'
          test -f 'PiliAvalon_android_2.0.8-f96a0e1d7+5162_armeabi-v7a.apk'
          test -f 'PiliAvalon_android_2.0.8-f96a0e1d7+5162_x86_64.apk'

      - name: Upload APKs to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            -R "$GITHUB_REPOSITORY" \
            --clobber \
            PiliAvalon_android_2.0.8-f96a0e1d7+5162_arm64-v8a.apk \
            PiliAvalon_android_2.0.8-f96a0e1d7+5162_armeabi-v7a.apk \
            PiliAvalon_android_2.0.8-f96a0e1d7+5162_x86_64.apk

      - name: Verify release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" \
            -R "$GITHUB_REPOSITORY" \
            --json tagName,isPrerelease,isDraft,targetCommitish,assets \
            --jq '{tagName,isPrerelease,isDraft,targetCommitish,assets:[.assets[].name]}'
